<!DOCTYPE html>
<html>
<head>
    <title>LM Profesionales</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }

        nav {
            background-color: #2c3e50;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #1abc9c;
        }

        header {
            background-color: #1abc9c;
            color: white;
            text-align: center;
            padding: 40px;
        }

        .contenido {
            padding: 20px;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>LM Profesionales</h1>
    <p>Gestión de servicios profesionales</p>
</header>

<nav>
    <a href="/">Inicio</a>
    <a href="/profesional/">Profesionales</a>
    <a href="/servicio/">Servicios</a>
    <a href="/entregable/">Entregables</a>
    <a href="/buscar/">Buscar</a>
</nav>

<div class="contenido">
    {% block contenido %}
    {% endblock %}
</div>

<footer>
    <p>© LM Profesionales - Proyecto Django</p>
</footer>

</body>
</html>
